name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-build:
    name: Server — build & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      # Generate Prisma client before type-checking so inferred types are accurate
      - run: npx prisma generate --no-engine
      - run: npm run build

  client-build:
    name: Client — build & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: Build (stub env vars)
        env:
          VITE_API_URL: /api
          VITE_PRIVY_APP_ID: stub
          VITE_FEE_RECIPIENT_ADDRESS: "0x0000000000000000000000000000000000000000"
          VITE_ADMIN_ADDRESSES: "0x0000000000000000000000000000000000000000"
        run: npm run build

  contracts-test:
    name: Contracts — compile & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npm run compile
      - run: npm test

  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [server-build, client-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build ./server -t jinkfidex-server:ci
      - name: Build client image
        run: |
          docker build ./client \
            --build-arg VITE_API_URL=/api \
            --build-arg VITE_PRIVY_APP_ID=stub \
            --build-arg VITE_FEE_RECIPIENT_ADDRESS=0x0000000000000000000000000000000000000000 \
            --build-arg VITE_ADMIN_ADDRESSES=0x0000000000000000000000000000000000000000 \
            -t jinkfidex-client:ci
